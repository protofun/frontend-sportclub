<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SportClub – Train. Grow. Achieve.</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link type="text/css" rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loading">
        <div class="spinner-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 50 50" role="presentation">
                <circle cx="25" cy="25" r="20" stroke="#e0e0e0" stroke-width="4" fill="none"/>
                <circle cx="25" cy="25" r="20" stroke="#1565C0" stroke-width="4" fill="none"
                        stroke-linecap="round" stroke-dasharray="90 125">
                    <animateTransform attributeName="transform" type="rotate"
                                      from="0 25 25" to="360 25 25" dur="0.8s" repeatCount="indefinite"/>
                </circle>
            </svg>
            <p>Loading SportClub...</p>
        </div>
    </div>
    <script type="application/javascript" src="webApp.js"></script>
</body>
</html>
